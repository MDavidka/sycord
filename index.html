<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <!-- Simple SVG Favicon for the phone brand -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO & Meta Tags -->
    <title>Aura | Engineered for Tomorrow</title>
    <meta name="description" content="Discover the latest flagship smartphones from Aura. Aerospace-grade titanium, advanced camera systems, and all-day battery life." />
    <meta name="theme-color" content="#0a0a0a" />
    
    <!-- Tailwind CSS CDN (Required by prompt instructions) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#0a0a0a] text-white antialiased selection:bg-[#2997ff] selection:text-white flex flex-col min-h-screen overflow-x-hidden">

    <div id="app" class="flex flex-col min-h-screen w-full">
      <!-- Fallback loading state before Vite injects the app -->
      <div class="flex-1 flex items-center justify-center min-h-screen">
        <div class="w-8 h-8 border-2 border-[#27272a] border-t-[#2997ff] rounded-full animate-spin"></div>
      </div>
    </div>

    <!-- Vite Entry Point -->
    <script type="module" src="/src/main.ts"></script>
